publicHoistPattern:
  - '*@heroui/*'
nodeLinker: hoisted
allowBuilds:
  '@heroui/shared-utils': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  better-sqlite3: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - postcss@8.5.16
